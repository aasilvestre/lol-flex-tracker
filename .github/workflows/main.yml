name: Coletar dados Challenger/GM Flex BR

on:
  schedule:
    # Roda todo início de hora, 24h/dia
    - cron: "0 * * * *"
  workflow_dispatch:
    # Permite rodar manualmente pela aba Actions do GitHub (útil para testar)

permissions:
  contents: write   # necessário para commitar o CSV de volta

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # mata o job se travar (ex: rate limit infinito)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Usa um token com permissão de push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coleta (um ciclo)
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: python collector.py

      - name: Commitar novo snapshot no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.csv
          # Só commita se houver mudança (evita commit vazio se a coleta falhou)
          git diff --staged --quiet || git commit -m "snapshot $(date -u +'%Y-%m-%dT%H:%M')"
          git push
