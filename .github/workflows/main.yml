name: Coletar dados Challenger/GM Flex BR

on:
  workflow_dispatch:
    # Disparado pelo cron-job.org todo início de hora via GitHub API.
    # Também pode ser rodado manualmente pela aba Actions do GitHub.

permissions:
  contents: write   # necessário para commitar o CSV de volta

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coleta (um ciclo)
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: python collector.py

      - name: Commitar novo snapshot no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.csv data/player_lp.csv
          git diff --staged --quiet || git commit -m "snapshot $(date -u +'%Y-%m-%dT%H:%M')"
          git push
